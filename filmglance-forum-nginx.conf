server {
    listen 80;
    server_name discuss.filmglance.com;

    location /filmglance-theme.css {
        alias /var/www/html/filmglance-theme.css;
    }

    location /filmglance-brand.js {
        alias /var/www/html/filmglance-brand.js;
    }

    location / {
        proxy_pass http://127.0.0.1:4567;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '<link rel="stylesheet" href="https://discuss.filmglance.com/filmglance-theme.css"><script src="https://discuss.filmglance.com/filmglance-brand.js" defer></script></head>';
        sub_filter_once on;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/discuss.filmglance.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/discuss.filmglance.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
