name: CI

on:
  pull_request:
  push:
    branches: [main, staging]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Audit (high+ only)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Service-role import guard
        # Block accidental supabaseAdmin imports outside the approved surface.
        # Audit Phase C — defense in depth. Even after the v6.3.1 user-scoped
        # client refactor lands, this guard prevents regressions where someone
        # accidentally pulls supabaseAdmin into a user-facing route and
        # bypasses RLS.
        #
        # Allowlist:
        #   - lib/**: all server-side library code (callees of approved routes)
        #   - app/api/<approved>/: routes that legitimately need service-role
        #     (cron, webhooks, admin/seed/backfill batch jobs, search pipeline,
        #     read-only public surfaces like /boxoffice and /posters)
        #
        # v6.3.1 tightened this list — `favorites`, `enrich-favorites`, and
        # `folders` have been removed because those routes are now on the
        # user-scoped Supabase client (RLS handles auth, no service-role).
        # Re-introducing `supabaseAdmin` to any of them would now fail this
        # guard, which is exactly the protection we wanted.
        run: |
          set -e
          MATCHES=$(grep -RIn "supabaseAdmin" app lib --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" 2>/dev/null \
            | grep -vE "^lib/" \
            | grep -vE "^app/api/(webhooks|cron|admin|seed|patch-video-reviews|search|suggest|enrich|auth|health|csp-report|boxoffice|posters)/" \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "Unexpected supabaseAdmin imports outside the approved surface:"
            echo "$MATCHES"
            echo ""
            echo "If this is intentional, update the allowlist in .github/workflows/ci.yml."
            exit 1
          fi
          echo "OK: no unexpected supabaseAdmin imports."
